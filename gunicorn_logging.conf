# Gunicorn logging — timestamps aligned with app logging_setup.py
[loggers]
keys=root,gunicorn.error,gunicorn.access

[handlers]
keys=error,access

[formatters]
keys=generic

[formatter_generic]
format=%(asctime)s | %(levelname)-8s | gunicorn | %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[handler_error]
class=logging.StreamHandler
formatter=generic
stream=ext://sys.stderr

[handler_access]
class=logging.StreamHandler
formatter=generic
stream=ext://sys.stdout

[logger_root]
level=INFO
handlers=error

[logger_gunicorn.error]
level=INFO
handlers=error
propagate=0
qualname=gunicorn.error

[logger_gunicorn.access]
level=INFO
handlers=access
propagate=0
qualname=gunicorn.access
