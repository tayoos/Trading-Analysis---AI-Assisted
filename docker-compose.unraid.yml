# ── Unraid deployment ──────────────────────────────────────────────────────────
#
# Primary data (DB + reports) lives on a fast ZFS pool share so analysis runs
# quickly.  Backups go to /mnt/user/appdata/stock-analyzer/backups which sits
# on your main Unraid array (parity-protected spinning drives).
#
# First-time setup:
#   1. docker login ghcr.io -u tayoos   (GitHub PAT with read:packages scope)
#   2. Create host directories — see README setup section
#   3. Start the container, then authenticate Claude once:
#        docker exec -it stock-analyzer claude login
#      Follow the browser link — credentials persist via the claude-auth volume below.
#
services:
  stock-analyzer:
    image: ghcr.io/tayoos/trading-analysis---ai-assisted:latest
    container_name: stock-analyzer
    ports:
      - "8765:8765"             # Unraid: set network type to "br0" to bind to LAN IP only
    environment:
      - TZ=${TZ:-Europe/London}
      - TRADING212_API_KEY=${TRADING212_API_KEY}
      - TRADING212_API_SECRET=${TRADING212_API_SECRET}
      - REPORTS_ENCRYPTION_KEY=${REPORTS_ENCRYPTION_KEY}
      - REPORTS_RETENTION_DAYS=365
      - SCHEDULE_DAYS=0,2,5
      - SCHEDULE_HOUR=3
      - SCHEDULE_MINUTE=0
      - SCHEDULE_ENABLED=true
      - DASHBOARD_USER=${DASHBOARD_USER}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - TRUSTED_NETWORKS=${TRUSTED_NETWORKS:-127.0.0.1/32,::1/128}
      - BACKUP_RETAIN_DAYS=${BACKUP_RETAIN_DAYS:-60}
      - OBSIDIAN_VAULT_DIR=${OBSIDIAN_VAULT_DIR:-/obsidian}
      - OBSIDIAN_REPORTS_SUBDIR=${OBSIDIAN_REPORTS_SUBDIR:-10_Personal/13_Finances/AI Investment Analysis}
      - OBSIDIAN_REPORTS_FULL_SUBDIR=${OBSIDIAN_REPORTS_FULL_SUBDIR:-Full Portfolio}
      - OBSIDIAN_REPORTS_SINGLE_SUBDIR=${OBSIDIAN_REPORTS_SINGLE_SUBDIR:-Individual Stock}
      - REPORTS_FULL_SUBDIR=${REPORTS_FULL_SUBDIR:-full}
      - REPORTS_SINGLE_SUBDIR=${REPORTS_SINGLE_SUBDIR:-single}
      - OBSIDIAN_KNOWLEDGE_ENABLED=${OBSIDIAN_KNOWLEDGE_ENABLED:-true}
      - OBSIDIAN_KNOWLEDGE_SUBDIR=${OBSIDIAN_KNOWLEDGE_SUBDIR:-50_Knowledge/notes}
      - OBSIDIAN_KNOWLEDGE_MOC_DIR=${OBSIDIAN_KNOWLEDGE_MOC_DIR:-50_Knowledge/_moc}
      - OBSIDIAN_DEFAULT_MOC=${OBSIDIAN_DEFAULT_MOC:-MOC-investment-analysis}
    volumes:
      # Option A (Unraid template): ${ZFS_APPDATA_PATH}:/data — subdirs auto-created.
      # Option B (split mounts):
      - ${ZFS_APPDATA_PATH:-/mnt/cache/appdata/stock-analyzer}/db:/data/db
      - ${ZFS_APPDATA_PATH:-/mnt/cache/appdata/stock-analyzer}/reports:/data/reports
      - ${ZFS_APPDATA_PATH:-/mnt/cache/appdata/stock-analyzer}/stocks:/data/stocks
      - ${ZFS_APPDATA_PATH:-/mnt/cache/appdata/stock-analyzer}/logs:/data/logs
      # ── Backup destination on main Unraid array (parity-protected) ───────────
      - /mnt/user/appdata/stock-analyzer/backups:/data/backups
      # ── Claude credentials (persistent, writable) ─────────────────────────────
      # After first container start, run:  docker exec -it stock-analyzer claude login
      # Credentials are written here and survive container restarts/updates.
      - /mnt/cache/appdata/stock-analyzer/claude-auth:/home/appuser/.claude
      # ── Obsidian vault (optional — set OBSIDIAN_VAULT_HOST_PATH in .env) ─────
      - ${OBSIDIAN_VAULT_HOST_PATH:-/mnt/user/appdata/obsidian/MyVault}:/obsidian
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower-stock-analyzer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Private GHCR: run  docker login ghcr.io -u tayoos  on Unraid first.
      # That creates /root/.docker/config.json which Watchtower reads here.
      - /root/.docker/config.json:/config.json
    command: stock-analyzer --interval 300
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
