services:
  stock-analyzer:
    image: ghcr.io/tayoos/trading-analysis---ai-assisted:latest
    container_name: stock-analyzer
    ports:
      - "8765:8765"             # Unraid: set network type to "br0" to bind to LAN IP only
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TRADING212_API_KEY=${TRADING212_API_KEY}
      - REPORTS_ENCRYPTION_KEY=${REPORTS_ENCRYPTION_KEY}
      - REPORTS_RETENTION_DAYS=365
      - SCHEDULE_DAYS=0,2,5
      - SCHEDULE_HOUR=7
      - DASHBOARD_USER=${DASHBOARD_USER}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
    volumes:
      - /mnt/user/appdata/stock-analyzer/db:/data/db
      - /mnt/user/appdata/stock-analyzer/reports:/data/reports
      - /mnt/user/stocks:/data/stocks
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower-stock-analyzer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Private GHCR: run  docker login ghcr.io -u tayoos  on Unraid first.
      # That creates /root/.docker/config.json which Watchtower reads here.
      - /root/.docker/config.json:/config.json
    command: stock-analyzer --interval 300
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
